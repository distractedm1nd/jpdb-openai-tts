<!DOCTYPE html>
<html>
<head>

    button:hover { background: #0d8c6d; }
    .status { margin-top: 8px; font-size: 12px; color: #666; }
  </style>
</head>

  <h3>jpdb OpenAI TTS</h3>
  <label for="key">OpenAI API Key</label>

  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
